name: Build Drone ARM64 Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ROS2/ARM64/vslam_drone/**'
      - '.github/workflows/build-drone-arm64.yml'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-push-drone:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space for ROS 2 images
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      # This is the magic step that allows the GitHub server (x86) to compile for Raspberry Pi (ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Drone Image (vslam_drone)
        uses: docker/build-push-action@v5
        with:
          context: ROS2/ARM64/vslam_drone/
          platforms: linux/arm64
          push: true
          tags: ghcr.io/robotics-avv/docker_files/vslam_drone:latest
