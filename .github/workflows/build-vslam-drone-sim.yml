name: Build VSLAM Drone Sim (x64)

on:
  push:
    paths:
      - 'ROS2/AMD64x86/vslam_drone_sim/Dockerfile'
      - '.github/workflows/build-vslam-drone-sim.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space for ROS 2 images
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push vslam_drone_sim
        run: |
          # Lowercase the repository name to satisfy Docker's requirement
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="ghcr.io/$REPO/vslam_drone_sim:latest"
          
          docker build -t $IMAGE_TAG ROS2/AMD64x86/vslam_drone_sim/
          docker push $IMAGE_TAG
