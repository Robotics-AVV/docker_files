name: Build Gazebo CUDA Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space for ROS 2 images
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Layer 1 (jazzy_base)
        run: |
          docker build -t ghcr.io/robotics-avv/docker_files/jazzy_base:latest ROS2/AMD64x86/jazzy_base/
          docker push ghcr.io/robotics-avv/docker_files/jazzy_base:latest

      - name: Build and Push Layer 2 (jazzy_base_cuda)
        run: |
          docker build -t ghcr.io/robotics-avv/docker_files/jazzy_base_cuda:latest ROS2/AMD64x86/jazzy_base_cuda/
          docker push ghcr.io/robotics-avv/docker_files/jazzy_base_cuda:latest

      - name: Build and Push Layer 3 (jazzy_gazebo_cuda)
        run: |
          docker build -t ghcr.io/robotics-avv/docker_files/jazzy_gazebo_cuda:latest ROS2/AMD64x86/jazzy_gazebo_cuda/
          docker push ghcr.io/robotics-avv/docker_files/jazzy_gazebo_cuda:latest
